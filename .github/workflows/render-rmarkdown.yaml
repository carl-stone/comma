# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    paths: ['**.Rmd']

name: render-rmarkdown.yaml

permissions: read-all

jobs:
  render-rmarkdown:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: renv

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            libcairo2-dev \
            libcurl4-openssl-dev \
            libfontconfig1-dev \
            libglpk-dev \
            libpng-dev \
            libssl-dev \
            zlib1g-dev \
            libbz2-dev \
            liblzma-dev

      - uses: r-lib/actions/setup-renv@v2

      - name: Install commaKit package
        run: Rscript -e 'install.packages(".", repos = NULL, type = "source")'

      - name: Render Rmarkdown files and Commit Results
        run: |
          set -euo pipefail

          before="${{ github.event.before }}"
          after="${{ github.sha }}"
          default_branch="${{ github.event.repository.default_branch }}"

          if git cat-file -e "${before}^{commit}" 2>/dev/null; then
            diff_base="$before"
          else
            git fetch --no-tags --prune origin "$default_branch"
            diff_base="$(git merge-base "origin/$default_branch" "$after")"
          fi

          mapfile -t RMD_PATH < <(git diff --name-only "$diff_base" "$after" -- '*.Rmd')
          if [ "${#RMD_PATH[@]}" -eq 0 ]; then
            echo "No R Markdown files changed."
            exit 0
          fi

          Rscript -e 'for (f in commandArgs(TRUE)) if (file.exists(f)) rmarkdown::render(f)' "${RMD_PATH[@]}"
          git config --local user.name "$GITHUB_ACTOR"
          git config --local user.email "$GITHUB_ACTOR@users.noreply.github.com"

          rendered_paths=()
          for file in "${RMD_PATH[@]}"; do
            rendered="${file%.Rmd}.md"
            if [ -e "$rendered" ]; then
              rendered_paths+=("$rendered")
            fi
          done

          if [ "${#rendered_paths[@]}" -eq 0 ]; then
            echo "No Markdown outputs to commit."
            exit 0
          fi

          git add "${rendered_paths[@]}"
          git commit -m 'Re-build Rmarkdown files' || echo "No changes to commit"
          git push origin || echo "No changes to commit"
